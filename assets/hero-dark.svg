<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="880" height="300"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif"
     role="img" aria-label="dscache — a prefix-cache profit-and-loss layer for DeepSeek coding agents">
  <defs>
    <linearGradient id="ds-grad-d" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8985FF"/>
      <stop offset="1" stop-color="#2DC79A"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="880" height="300" fill="#1D1D1F"/>

  <!-- ledger glyph: HIT (green) vs MISS (red) tier marks -->
  <g transform="translate(96 150)">
    <rect x="-52" y="-58" width="104" height="116" rx="18" fill="#8985FF" fill-opacity="0.16" stroke="#8985FF" stroke-width="1.6"/>
    <rect x="-36" y="-40" width="72" height="16" rx="5" fill="#2DC79A" fill-opacity="0.9"/>
    <rect x="-36" y="-16" width="72" height="16" rx="5" fill="#2DC79A" fill-opacity="0.9"/>
    <rect x="-36" y="8"  width="72" height="16" rx="5" fill="#FF6166" fill-opacity="0.92"/>
    <rect x="-36" y="32" width="72" height="16" rx="5" fill="#2DC79A" fill-opacity="0.9"/>
  </g>

  <!-- wordmark -->
  <text x="184" y="138" font-size="72" font-weight="800" fill="url(#ds-grad-d)" letter-spacing="-1.5">dscache</text>

  <!-- one-line description -->
  <text x="186" y="182" font-size="21" font-weight="600" fill="#F5F5F7">DeepSeek prefix-cache 利润表</text>
  <text x="186" y="214" font-size="15" font-weight="500" fill="#A1A1A8">两行代码看清每次请求是命中还是被打爆，把上下文缓存折扣稳稳拿回来。</text>

  <!-- tier legend chips -->
  <g font-size="12" font-weight="600">
    <rect x="186" y="236" width="68" height="26" rx="13" fill="#2DC79A" fill-opacity="0.16" stroke="#2DC79A" stroke-width="1.2"/>
    <text x="220" y="253" text-anchor="middle" fill="#5BE0BC">HIT</text>
    <rect x="262" y="236" width="92" height="26" rx="13" fill="#F2B705" fill-opacity="0.18" stroke="#F2B705" stroke-width="1.2"/>
    <text x="308" y="253" text-anchor="middle" fill="#F2C95B">PARTIAL</text>
    <rect x="362" y="236" width="74" height="26" rx="13" fill="#FF6166" fill-opacity="0.16" stroke="#FF6166" stroke-width="1.2"/>
    <text x="399" y="253" text-anchor="middle" fill="#FF8A8E">MISS</text>
  </g>
</svg>
